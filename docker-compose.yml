version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cobranca_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cobranca
      POSTGRES_USER: cobranca_user
      POSTGRES_PASSWORD: cobranca_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cobranca_user -d cobranca']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cobranca_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cobranca_user:cobranca_pass@postgres:5432/cobranca
      PORT: 3001
      NODE_ENV: production
      META_MENSAL: 250000
    ports:
      - '3001:3001'
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cobranca_ui
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'

volumes:
  postgres_data:
